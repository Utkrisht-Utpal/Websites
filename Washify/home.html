<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washify</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="main-box">
        <div class="navbar">
            <div class="first-box">
                <div class="left">
                    <div class="location-box">
                        <img src="./assets/location-pin-svgrepo-com.svg" alt="location pin" class="location-pin">
                        <div class="location">123 Main Street, India</div>
                    </div>
                </div>

                <div class="notification">
                    <img src="./assets/notification-svgrepo-com.svg" alt="notification" class="notification">
                </div>
            </div>
            <input type="text" title="search-bar" class="search-bar" placeholder="Search  services...">
        </div>

        <div class="home-box">
            <h1 class="services-h">Our services</h1>
            <div class="services-grid">
                <a href="./service.html" class="card">
                    <img src="./assets/wash-svgrepo-com.svg" alt="services">
                    <p>Wash</p>
                </a>

                <div class="card">
                    <img src="./assets/hanger-2-svgrepo-com.svg" alt="services">
                    <p>Dry clean</p>
                </div>

                <div class="card">
                    <img src="./assets/ironing-laundry-svgrepo-com.svg" alt="services">
                    <p>Ironing</p>
                </div>

                <div class="card">
                    <img src="./assets/history-svgrepo-com.svg" alt="services">
                    <p>History</p>
                </div>

                <div class="card">
                    <img src="./assets/payment-svgrepo-com.svg" alt="services">
                    <p>Payment</p>
                </div>

                <div class="card">
                    <img src="./assets/account-settings-svgrepo-com.svg" alt="services">
                    <p>Help</p>
                </div>
            </div>
        </div>

        <div class="footer-navbar">
            <div class="home">
                <img src="./assets/home-svgrepo-com.svg" alt="Home">
                <p>Home</p>
            </div>
            <div class="orders">
                <img src="./assets/order-svgrepo-com.svg" alt="Orders">
                <p>Orders</p>
            </div>
            <div class="schedule">
                <img src="./assets/schedule-svgrepo-com.svg" alt="Schedules">
                <p>Schedule</p>
            </div>
            <div class="accounts">
                <img src="./assets/profile-svgrepo-com.svg" alt="Account">
                <p>Accounts</p>
            </div>
        </div>
    </div>
</body>

</html>
