<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washify</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/app.js" defer></script>
</head>

<body>
    <div class="main-box">

        <div class="navbar">
            <h2>Payments</h2>
        </div>

        <div class="home-box">

            <div class="payment-option">
                <p>Cash on Delivery</p>
            </div>

            <div class="payment-option">
                <p>UPI</p>
            </div>

            <div class="payment-option">
                <p>Other</p>
            </div>

            <div class="sel"><button class="ctn-btn" id="pay">Pay Now</button></div>

        </div>

        <div class="footer-navbar">
            <div class="home">
                <img src="./assets/home-svgrepo-com.svg" alt="Home">
                <p>Home</p>
            </div>
            <div class="orders">
                <img src="./assets/order-svgrepo-com.svg" alt="Orders">
                <p>Orders</p>
            </div>
            <div class="schedule">
                <img src="./assets/schedule-svgrepo-com.svg" alt="Schedules">
                <p>Schedule</p>
            </div>
            <div class="accounts">
                <img src="./assets/profile-svgrepo-com.svg" alt="Account">
                <p>Accounts</p>
            </div>
        </div>
    </div>
</body>

</html>
